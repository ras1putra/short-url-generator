services:
  db:
    image: postgres:17-alpine
    env_file:
      - ./backend/.env
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  garage:
    build:
      context: ./backend
      dockerfile: Dockerfile.garage
    ports:
      - "3900:3900" # S3 API
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/garage.toml:/etc/garage.toml:ro
      - garage_meta:/var/lib/garage/meta
      - garage_data:/var/lib/garage/data
    entrypoint: >
      sh -c '
        /bin/garage server &
        echo "Waiting for Garage S3 to start..."
        sleep 3
        NODE_ID=$$(/bin/garage node id -q | cut -c 1-16)
        echo "Got Node ID: $$NODE_ID"
        
        if ! /bin/garage status | grep -q "local"; then
          echo "Initializing cluster layout..."
          /bin/garage layout assign $$NODE_ID --zone local --capacity 10G
          /bin/garage layout apply --version 1
        fi
        
        if ! /bin/garage key info $$S3_ACCESS_KEY >/dev/null 2>&1; then
          echo "Importing production S3 keys..."
          /bin/garage key import $$S3_ACCESS_KEY $$S3_SECRET_KEY --yes
        fi
        
        if ! /bin/garage bucket info $$S3_BUCKET >/dev/null 2>&1; then
          echo "Creating S3 bucket..."
          /bin/garage bucket create $$S3_BUCKET
          /bin/garage bucket allow $$S3_BUCKET --key $$S3_ACCESS_KEY --read --write --owner
          /bin/garage bucket website --allow $$S3_BUCKET
          echo "Garage S3 successfully initialized!"
        else
          # Ensure permissions are granted even if bucket existed
          /bin/garage bucket allow $$S3_BUCKET --key $$S3_ACCESS_KEY --read --write --owner
        fi
        
        wait
      '
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3903/metrics" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      garage:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    depends_on:
      - backend
    read_only: true
    tmpfs:
      - /tmp
      - /app/.next/cache
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    restart: unless-stopped

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile.migrate
    env_file:
      - ./backend/.env
    command: sh -c 'migrate -path=/migrations/ -database "postgres://$${DB_USER}:$${DB_PASSWORD}@db:$${DB_PORT}/$${DB_NAME}?sslmode=disable" up'
    entrypoint: ""
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  ipfs:
    image: ipfs/kubo:latest
    container_name: ipfs-node
    ports:
      - "127.0.0.1:5001:5001" # API Port (Private/Localhost only)
      - "127.0.0.1:8080:8080" # Gateway Port (Private/Localhost only)
      - "4001:4001" # Swarm Port (Public)
    volumes:
      - ipfs_data:/data/ipfs
    environment:
      - IPFS_PATH=/data/ipfs
    restart: unless-stopped

volumes:
  db_data:
  redis_data:
  garage_meta:
  garage_data:
  ipfs_data:
